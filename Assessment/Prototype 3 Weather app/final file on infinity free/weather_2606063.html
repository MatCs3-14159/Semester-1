<!----Javascript---->
<script>
// ================= DEFAULT CITY ================= //
const DEFAULT_CITY = "Portsmouth";

// ================= DOM ELEMENTS ================= //
const searchInput = document.getElementById('search-bar');
const searchBtn = document.getElementById('search-btn');
const iconEl = document.getElementById('icon');
const cityEl = document.getElementById('city');
const dateEl = document.getElementById('date');
const mainEl = document.getElementById('main');
const tempEl = document.getElementById('temp');
const pressureEl = document.getElementById('pressure');
const humidityEl = document.getElementById('humidity');
const windEl = document.getElementById('wind');
const locationBtn = document.getElementById('location-btn');

// ================= EVENT LISTENERS ================= //
searchBtn.addEventListener('click', handleSearch);

locationBtn.addEventListener('click', getLocationWeather);

searchInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        handleSearch();
    }
});

window.addEventListener('DOMContentLoaded', () => {
    searchInput.value = DEFAULT_CITY;
    getAndDisplayWeather(DEFAULT_CITY);
});

// ================= AUDIO ================= //
function playClickSound() {
    const sound = document.getElementById('clickSound');
    sound.play().catch(() => {});
}

// ================= WEATHER FETCH ================= //
async function fetchWeather(city = null, lat = null, lon = null) {
    try {
        let url = `https://sagarmishra.infinityfree.me/connection.php?`;
        if (lat && lon) {
            url += `lat=${lat}&lon=${lon}`;
        } else if (city) {
            url += `q=${city}`;
        } else {
            url += `q=Portsmouth`;
        }

        const response = await fetch(url);
        if (!response.ok) throw new Error("Weather not available");
        const data = await response.json();
        return data;

    } catch (error) {
        console.error(error);
        alert("Weather data not available");
        return null;
    }
}

// ================= HANDLE SEARCH ================= //
async function handleSearch() {
    playClickSound();

    const city = searchInput.value.trim();
    if (!city) {
        alert("Please enter a city name");
        return;
    }

    getAndDisplayWeather(city);

    searchInput.value = '';
}

// ================= CACHE THEN NETWORK ================= //
async function getAndDisplayWeather(city) {
    let data;

    if (navigator.onLine) {
        // ONLINE: fetch from backend (PHP/API)
        data = await fetchWeather(city);

        if (data) {
            // Save to localStorage
            localStorage.setItem(city, JSON.stringify(data));
            console.log("Saved to localStorage:", city);
        }
    } else {
        // OFFLINE: load from localStorage
        const cachedData = localStorage.getItem(city);

        if (cachedData) {
            data = JSON.parse(cachedData);
            console.log("Loaded from localStorage (offline):", city);
        } else {
            alert("No cached data available for offline use.");
            return;
        }
    }

    // Step 5 & 6: Display weather
    if (data) {
        displayWeather(data);
    }
}

// ================= WEATHER ICON ================= //
function getWeatherIcon(iconCode) {
    const iconMap = {
        "01d": "☀️", "01n": "🌙",
        "02d": "⛅", "02n": "☁️",
        "03d": "☁️", "03n": "☁️",
        "04d": "☁️", "04n": "☁️",
        "09d": "🌧️", "09n": "🌧️",
        "10d": "🌦️", "10n": "🌧️",
        "11d": "⛈️", "11n": "⛈️",
        "13d": "❄️", "13n": "❄️",
        "50d": "🌫️", "50n": "🌫️"
    };

    return iconMap[iconCode] || "☁️";
}

// ================= CLOCK (RUNS ONCE) ================= //
let clockStarted = false;

function startClock() {
    if (clockStarted) return;
    clockStarted = true;

    setInterval(() => {
        const now = new Date();
        const time = now.toLocaleTimeString('en-US', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
        dateEl.innerHTML = `${now.toDateString()}<br>${time}`;
    }, 1000);
}

// ================= DISPLAY WEATHER ================= //
function displayWeather(data) {
    const iconCode = data.weather[0].icon;
    const iconText = getWeatherIcon(iconCode);

    iconEl.innerHTML = `<span class="weather-icon">${iconText}</span>`;

    cityEl.textContent = `City: ${data.name}, ${data.sys.country}`;

    mainEl.textContent = `Weather: ${data.weather[0].description}`;

    tempEl.textContent = `Temperature: ${data.main.temp} °C`;

    pressureEl.textContent = `Pressure: ${data.main.pressure} hPa`;

    humidityEl.textContent = `Humidity: ${data.main.humidity}%`;

    windEl.textContent = `Speed: ${data.wind.speed} m/s, Direction: ${data.wind.deg}°`;

    startClock();
}
// ================= Geo-Location ================= //
async function getLocationWeather() {
    playClickSound();

    if (!navigator.geolocation) {
        alert("Geolocation is not supported by your browser");
        return;
    }

    navigator.geolocation.getCurrentPosition(async (position) => {
        const { latitude, longitude } = position.coords;
        const data = await fetchWeather(null, latitude, longitude);
        if (data) displayWeather(data);
    }, (error) => {
        console.error(error);
        alert("Unable to retrieve your location");
    });
}

async function fetchWeatherByCoords(lat, lon) {
    try {
        const response = await fetch(`https://sagarmishra.infinityfree.me/connection.php?lat=${lat}&lon=${lon}`);
        if (!response.ok) throw new Error("Weather not available");
        const data = await response.json();
        return data;
    } catch (error) {
        console.error(error);
        alert("Weather data not available for your location");
        return null;
    }
}

</script>
