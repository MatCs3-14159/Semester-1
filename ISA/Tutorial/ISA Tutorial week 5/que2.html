<!DOCTYPE html>
<html>
    <head>
        <title>EVENT listener</title><style>

        </style>
    </head>
    <body>
        <button id="click">CLICK HERE</button>
        <script>
            const button = document.getElementById("click");
            button.addEventListener("click",()=>{
                alert("!!BUTTON CLICKED!!");
                console.log("!!BUTTON CLICKED!!");
            });
        </script>
    </body>
</html>
