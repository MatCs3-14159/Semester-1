<!DOCTYPE html>
<html>
<head>
	<title>Workshop 4</title>
	<style>
		body {
			font-family: Arial;
			background-color: #ccffff;
			color: #0a126b;
			font-size: 150%;
		}

		#output{
			border: 12px double #202775;
			color: #523620;
			text-align: center;
			padding: 20px;
			margin: 20px auto 10px auto ;
			width: 450px;
		}

		.button{
			font-family: Arial;
			font-size: 14pt;
			color: white;
			background-color: #202775;
		}
		
	</style>
</head>
<body>
	<h1>Math Drills</h1>
	<!-- Math Operator Input -->
	Select an arithmetic operation (* or +):
	<input type="text" id="tbOperator" value="*">
	<br> <br>

	<!-- Integer Input -->
	Enter a positive integer value between 1 and 100:
	<input type="text" id="tbInteger">
	<br> <br>

	<!-- Buttons -->
	<input type="button" value="Calculate" class="button" onclick="calculate()" />
	<input type="button" value="Clear" class="button" onclick="clearOutput()" />

	<!-- Output -->
	<div id="output"></div>

	<!-- Javascript -->
	<script>
		function calculate() {
			let Operator = document.getElementById("tbOperator").value;
			let integer = parseInt(document.getElementById("tbInteger").value);
			let output = document.getElementById("output");

			if (integer <1 || isNaN(integer) || integer > 100 ){
				alert("Enter only positive integer from 1 to 100 inclusive.");
				document.getElementById("tbInteger").value = "";
				document.getElementById("tbOperator").value = "";
				return;
			}
			let result = "";

			for (let i = 1;i<=12;i++){
				if (Operator == "*"){
					result += `${integer} * ${i} = ${integer * i}<br>`;
				} else if (Operator == "+") {
					result += `${integer} + ${i} = ${integer + i}<br>`;
				} else {
					alert ("Please use + or * operator only.");
		 			return;
				}
				output.innerHTML = result;
			}
		}
		function clearOutput() {
			document.getElementById("tbInteger").value = "";
			document.getElementById("tbOperator").value ="";
			document.getElementById("output").innerHTML ="";
		}
	</script>
</body>
</html>
