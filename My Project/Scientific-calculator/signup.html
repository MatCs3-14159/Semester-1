<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Derivix | Sign Up</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-box {
            background: #111;
            color: #fff;
            padding: 35px;
            width: 370px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.25);
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #00e5ff;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00e5ff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00bcd4;
        }

        .link {
            margin-top: 15px;
            text-align: center;
            font-size: 0.9rem;
        }

        .link a {
            color: #00e5ff;
            text-decoration: none;
        }
        #particles-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            inset: 0;
            z-index: -1;
        }
        @media (max-width: 400px) {
            .auth-box {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="auth-box">
        <h2>Sign Up</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>

            <button type="submit">Create Account</button>
        </form>

        <div class="link">
            Already have an account?
            <a href="signin.html">Sign In</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.js"></script>
    <script src="js/particles.js"></script>
</body>
</html>
